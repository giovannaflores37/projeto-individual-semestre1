<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Web | Cadastro</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
    <div class="banner">
        <div class="ladoEsquerdo">
            <div class="topo">
                <a href="home.html">
                    <img src="img/logo.png" alt="Logo Brawl">
                </a>
            </div>
            <div class="imgBrawlers">
                <img src="img/piratesTrio.png"Brawlers">
            </div>
        </div>
        <div class="ladoDireito">
            <div class="cardCadastrar">
                <div class="tit">
                    <img src="img/estrela.png" alt="Estrela Brawl">
                    <h2 class="p1">CRIAR</h2>
                    <h2 class="p2">CONTA</h2>
                </div>
                <div class="textTit">
                    <p>Preencha os campos para se cadastrar</p>
                </div>
                <div class="inpCadastrar">
                    <input type="text" placeholder="Nome de usuário">
                    <input type="text" placeholder="E-mail">
                    <input type="password" placeholder="Senha">
                    <input type="password" placeholder="Confirmar senha">
                </div>
                <button>CADASTRAR</button>
                <div class="fraF">
                    <p>Já tem uma conta?  <a href="login.html">ENTRAR</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p class="textFooter">2026 Brawl Stars Web. Todos os direitos reservados.</p>
    </div>
</body>
</html>
