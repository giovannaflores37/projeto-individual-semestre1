<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Web | Cadastro</title>
    <link rel="stylesheet" href="css/cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <script src="js/cadastro.js" defer></script>
</head>
<body>
    <div class="banner">
        <div class="ladoEsquerdo">
            <div class="tits">
                <h1 class="t1">COMECE SUA JORNADA NO</h1>
                <h1 class="t2">MUNDO BRAWL!</h1>
                <p class="textLog">Crie sua conta para começar sua jornada no universo <br>
                Brawl Stars e aproveitar todos os recursos do site</p>
                <div class="imgBrawlers">
                    <img src="img/piratesTrio.png"Brawlers">
                </div>
            </div>
        </div>
        <div class="ladoDireito">
            <div class="topo">
                <a href="home.html">
                    <img src="img/logo.webp" alt="Logo Brawl">
                </a>
            </div>
            <div class="cardCadastrar">
                <div class="tit">
                    <img src="img/estrela.png" alt="Estrela Brawl">
                    <div class="titCentral">
                        <div class="tits">
                            <h2 class="p1">CRIAR</h2>
                            <h2 class="p2">CONTA</h2>
                        </div>
                        <div class="textTit">
                            <p>Preencha os campos para se cadastrar</p>
                        </div>
                    </div>
                </div>
                <div class="inpCadastrar">
                    <input id="input_nome" type="text" placeholder="Nome de usuário">
                    <input id="input_email" type="text" placeholder="E-mail">
                    <input id="input_senha" type="password" placeholder="Senha">
                    <input id="input_confSenha" type="password" placeholder="Confirmar senha">
                </div>
                <button onclick="Valicadastrar()" >CADASTRAR</button>
                <div class="fraF">
                    <p>Já tem uma conta?  <a href="login.html">ENTRAR</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
