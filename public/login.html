<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Web | Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <script src="js/login.js" defer></script>
</head>
<body>
    <div class="banner">
        <div class="ladoEsquerdo">
            <div class="tits">
                <h1 class="t1">BEM VINDO DE VOLTA AO</h1>
                <h1 class="t2">MUNDO BRAWL!</h1>
                <p class="textLog">Faça o login para continuar sua jornada no universo
                    <br> Brawl Stars e aproveitar todos os recursos do site</p>
            </div>
            <div class="imgBrawlers">
                <img src="img/BrawlersLogin.png" alt="Brawlers">
            </div>
        </div>
        <div class="ladoDireito">
            <div class="topo">
                <a href="home.html">
                    <img src="img/logo.webp" alt="Logo Brawl">
                </a>
            </div>
            <div class="cardLog">
                <div class="tit">
                    <img src="img/estrela.png" alt="Estrela Brawl">
                    <h2>ENTRAR</h2>
                </div>
                <div class="textTit">
                    <p>Acesse sua conta para continuar</p>
                </div>
                <div class="inpLogin">
                    <input id="input_emailL" type="text" placeholder="E-mail">
                    <input id="input_senhaL" type="password" placeholder="Senha">
                    <button onclick="valiEntrar()">ENTRAR</button>
                </div>
                <div class="fraF">
                    <p>Não tem uma conta?  <a href="cadastro.html">CADASTRAR</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p class="textFooter">2026 Brawl Stars Web. Todos os direitos reservados.</p>
    </div>
</body>
</html>
