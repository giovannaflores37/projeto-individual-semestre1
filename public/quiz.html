<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Web | Quiz</title>
    <link rel="stylesheet" href="css/quiz.css">
    <script src="js/quiz.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="logoTopo">
            <div class="estrela">
                <img src="img/logoEstrela.png" alt="Logo estrela Brawl">
            </div>
            <div class="nome">
                <img src="img/logoNome.png" alt="Logo nome Brawl Stars">
            </div>
        </div>
        <div class="navbar">
            <li>
                <a href="home.html">INÍCIO</a>
            </li>
            <li class="agora">
                <a href="#">QUIZ</a>
            </li>
            <li>
                <a href="dashboard.html">DASHBOARD</a>
            </li>
        </div>
        <div class="perfil">
            <img src="img/caveiraAmarela.png" alt="Caveira Brawl">
            <div class="text">
                <p>NOME JOGADOR</p>
                <div class="trofeu">
                    <img src="img/trofeuAmarelo.png" alt="Ícone troféu">
                    <p>1000</p>
                </div>
            </div>
        </div>
    </div>
    <div class="banner">
        <div class="cardInicio" id="inicio">
            <div class="tits">
                <div class="cardEstrela">
                    <img src="img/estrela.png" alt="Estrela Brawl">
                </div>
                <div class="text">
                    <h2 class="tit1">QUIZ</h2>
                    <h2 class="tit2">BRAWL STARS</h2>
                </div>
            </div>
            <div class="text">
                <p>Teste seus conhecimentos <br> sobre o universo do Brawl Stars!</p>
            </div>
            <div class="butIniciar">
                <button onclick="iniciarQuiz()">INICIAR QUIZ</button>
            </div>
            <div class="caixa">
                <img src="img/megacaixa.png" alt="Megacaixa Brawl">
            </div>
            <div class="personagem">
                <img src="img/corvoInvertido.png" alt="Spike personagem Brawl">
            </div>
        </div>

        <div class="cardQuiz escondido" id="quiz" >
            <div>
                <span>Questão atual: <span id="numeroQuestaoAtual"></span> de <span id="qtdQuestoes"></span> questões.</span>
            </div>
            
            <div>
                <span id="questaoExibida"></span>
            </div>
            <div class="opcoes">
                <span>
                    <input type="radio" id="primeiraOpcao" name="option" value="alternativaA" />
                    <label for="primeiraOpcao" id="labelOpcaoUm"></label>
                </span>
                <span>
                    <input type="radio" id="segundaOpcao" name="option"  value="alternativaB" />
                    <label for="segundaOpcao" id="labelOpcaoDois"></label>
                </span>
                <span>
                    <input type="radio" id="terceiraOpcao" name="option"  value="alternativaC" />
                    <label for="terceiraOpcao" id="labelOpcaoTres"></label>
                </span>
                <span>
                    <input type="radio" id="quartaOpcao" name="option"  value="alternativaD" />
                    <label for="quartaOpcao" id="labelOpcaoQuatro"></label>
                </span>
            </div>
            <div>
                <span>Acertos: <span id="numeroAcertos"></span></span>
            </div>
            <div>
                <button id="butProxima"onclick="proximaPergunta()" disabled>Próxima</button>
            </div>
        </div>

        <div class="cardFinal escondido" id="final">
            <h1>QUIZ CONCLUÍDO!</h1>
            <div>
                <p>VOCÊ ACERTOU</p>
                <h2><span id="acertosFinal"></span> / <span id="totalQuestoesFinal"></span></h2>
            </div>
            <div id="mensagemFinal"></div>
            <div>
                <button onclick="reiniciarQuiz()">TENTAR NOVAMENTE</button>
                <button onclick="window.location.href='home.html'">VOLTAR AO INÍCIO</button>
            </div>
        </div>
    </div>
</body>
</html>
